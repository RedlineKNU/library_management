{% extends 'base.html' %}

{% block title %}Жанри — Бібліотека{% endblock %}

{% block content %}
<h1 class="h2 mb-4"><i class="bi bi-tags"></i> Жанри</h1>
<div class="row row-cols-2 row-cols-md-4 g-3">
    {% for genre in genres %}
    <div class="col">
        <a href="{% url 'books:list' %}?genre={{ genre.pk }}" class="card text-decoration-none text-dark h-100 shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">{{ genre.name }}</h5>
                <p class="text-muted">{{ genre.books.count }} книг</p>
            </div>
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
